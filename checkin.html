<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel do Monitor - Portaria</title>
    <style>
        body { font-family: sans-serif; background-color: #0b0f19; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .container { background: #171e2e; padding: 35px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        #loginArea { display: block; }
        #appArea { display: none; }
        input { padding: 12px; width: 80%; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #0284c7; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="boxValidacao">
    <div id="loginArea">
        <h1>🔐 Acesso Restrito</h1>
        <p>Senha de monitor:</p>
        <input type="password" id="senhaMonitor" placeholder="Senha">
        <br>
        <button onclick="verificarSenha()">Entrar</button>
    </div>

    <div id="appArea">
        <h1>Portaria Maker</h1>
        <div id="loading">⏳ Processando...</div>
        <div id="sucesso" style="display:none; background:#15803d; padding:20px; border-radius:10px;">
            <div id="nomePessoa" style="font-weight:bold; font-size:1.5em;"></div>
            <div id="faculPessoa"></div>
            <ul id="listaOficinas" style="list-style:none; padding:0;"></ul>
        </div>
        <div id="erro" style="display:none; background:#b91c1c; padding:20px; border-radius:10px;">
            <span id="mensagemErro"></span>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwBbBjMskcC528BroZH-BdluLY-qL1fP_Lc-p-b8r9-eoUiwIEV68ZRMMFgFab4ooRH4w/exec";
    const SENHA_SECRETA = "Mister2026"; 

    function verificarSenha() {
        if(document.getElementById('senhaMonitor').value === SENHA_SECRETA) {
            localStorage.setItem('monitor_autenticado', 'true');
            iniciarCheckin();
        } else { alert("Senha incorreta!"); }
    }

    function iniciarCheckin() {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('appArea').style.display = 'block';
        executarCheckin();
    }

    if(localStorage.getItem('monitor_autenticado') === 'true') iniciarCheckin();

    async function executarCheckin() {
        const params = new URLSearchParams(window.location.search);
        const idIngresso = params.get('id');
        if(!idIngresso) { document.getElementById('loading').innerText = "❌ QR Code não detectado."; return; }

        try {
            const response = await fetch(API_URL, {
                method: 'POST', mode: 'cors', body: JSON.stringify({ action: "checkin", id: idIngresso })
            });
            const result = await response.json();
            document.getElementById('loading').style.display = 'none';

            if(result.sucesso) {
                document.getElementById('sucesso').style.display = 'block';
                document.getElementById('nomePessoa').innerText = result.nome;
                document.getElementById('faculPessoa').innerText = result.instituicao;
                result.oficinas.forEach(oficina => {
                    if(oficina && oficina !== "Nenhuma") {
                        let li = document.createElement('li');
                        li.innerText = "🛠️ " + oficina;
                        document.getElementById('listaOficinas').appendChild(li);
                    }
                });
            } else {
                document.getElementById('erro').style.display = 'block';
                document.getElementById('mensagemErro').innerText = result.mensagem;
            }
        } catch(e) { document.getElementById('loading').innerText = "Erro de conexão."; }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Fábrica Digital</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1e1e24; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #2a2a35; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 500px; }
        h2 { text-align: center; margin-bottom: 25px; color: #4f46e5; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #cbd5e1; }
        input, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #4b5563; background-color: #374151; color: #fff; font-size: 16px; }
        input:focus, select:focus { outline: 2px solid #4f46e5; }
        button { width: 100%; padding: 14px; background-color: #4f46e5; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #4338ca; }
        button:disabled { background-color: #6b7280; cursor: not-allowed; }
        .loading-text { text-align: center; font-style: italic; color: #a1a1aa; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Inscrição em Oficinas</h2>
    <form id="cadastroForm">
        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
        </div>

        <div class="form-group">
            <label for="matricula">Matrícula:</label>
            <input type="text" id="matricula" name="matricula" required placeholder="Digite sua matrícula">
        </div>

        <div class="form-group">
            <label for="email">E-mail (Institucional ou Pessoal):</label>
            <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">
        </div>

        <div class="form-group">
            <label for="whatsapp">WhatsApp / Telefone:</label>
            <input type="tel" id="whatsapp" name="whatsapp" required placeholder="(XX) XXXXX-XXXX">
        </div>

        <div class="form-group">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" required min="0" max="120" placeholder="Ex: 20">
        </div>

        <div class="form-group">
            <label for="oficina1">Oficina 1 (Obrigatória):</label>
            <select id="oficina1" name="oficina1" required>
                <option value="" disabled selected>Selecione uma oficina</option>
                <option value="Modelagem">Modelagem</option>
                <option value="CNC">CNC</option>
                <option value="Prototipagem">Prototipagem</option>
            </select>
        </div>

        <div class="form-group">
            <label for="oficina2">Oficina 2 (Opcional):</label>
            <select id="oficina2" name="oficina2">
                <option value="Nenhuma" selected>Nenhuma</option>
                <option value="Modelagem">Modelagem</option>
                <option value="CNC">CNC</option>
                <option value="Prototipagem">Prototipagem</option>
            </select>
        </div>

        <div class="form-group">
            <label for="oficina3">Oficina 3 (Opcional):</label>
            <select id="oficina3" name="oficina3">
                <option value="Nenhuma" selected>Nenhuma</option>
                <option value="Modelagem">Modelagem</option>
                <option value="CNC">CNC</option>
                <option value="Prototipagem">Prototipagem</option>
            </select>
        </div>

        <button type="submit" id="btnEnviar">Concluir Inscrição</button>
        <div class="loading-text" id="statusMensagem">Enviando e-mail de confirmação...</div>
    </form>
</div>

<script>
    // Sua URL oficial configurada para comunicação direta
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx85SSZvsRslK644X6eqaQE1_i6IXbQ4MnwBGh8sSf-Wz_fCuRoMg_x5HCdmvdIWuGj5w/exec";

    document.getElementById('cadastroForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnEnviar');
        const statusMsg = document.getElementById('statusMensagem');
        
        btn.disabled = true;
        statusMsg.style.display = 'block';

        const formData = new FormData(this);
        const urlParams = new URLSearchParams(formData).toString();

        // Envia os parâmetros via requisição POST segura
        fetch(WEB_APP_URL + "?" + urlParams, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                // Redireciona para a página de confirmação passando o ID e o Nome pela URL
                window.location.href = `confirmacao.html?id=${data.id}&nome=${encodeURIComponent(data.nome)}`;
            } else {
                alert('Erro ao processar inscrição: ' + data.message);
                btn.disabled = false;
                statusMsg.style.display = 'none';
            }
        })
        .catch(error => {
            alert('Erro de comunicação. Certifique-se de que atualizou a implantação no Apps Script.');
            console.error('Erro:', error);
            btn.disabled = false;
            statusMsg.style.display = 'none';
        });
    });
</script>
</body>
</html>

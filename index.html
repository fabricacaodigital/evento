<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Confirmação - CEFET</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 480px; box-sizing: border-box; }
        h1 { color: #2563eb; text-align: center; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.9em; color: #475569; }
        input, select { width: 100%; padding: 11px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; background-color: #f8fafc; font-family: inherit; }
        button { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-top: 25px; transition: 0.2s; }
        button:hover { background-color: #1d4ed8; }
        
        #areaQRCode { display: none; text-align: center; margin-top: 25px; border-top: 2px dashed #cbd5e1; padding-top: 25px; }
        .aviso { color: #16a34a; font-weight: bold; margin-top: 15px; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <div id="formularioArea">
        <h1>Confirme sua Presença</h1>
        <p style="text-align:center; color:#64748b; margin-bottom: 20px;">Gere seu QR Code de acesso oficial para o evento.</p>
        
        <form id="formInscricao">
            <label>Nome Completo</label>
            <input type="text" id="nome" required>
            
            <label>Matrícula</label>
            <input type="text" id="matricula" required>
            
            <div style="display: flex; gap: 12px;">
                <div style="flex: 1;">
                    <label>Idade</label>
                    <input type="number" id="idade" required>
                </div>
                <div style="flex: 2;">
                    <label>Instituição</label>
                    <input type="text" id="instituicao" placeholder="Ex: CEFET, UFRJ" required>
                </div>
            </div>

            <label>E-mail (Para receber o QR Code)</label>
            <input type="email" id="email" required>
            
            <label>WhatsApp</label>
            <input type="tel" id="whatsapp" placeholder="Ex: 21999999999" required>
            
            <label>Oficina 1 (Obrigatória)</label>
            <select id="oficina1" required>
                <option value="">Selecione...</option>
                <option value="Corte a Laser">Corte a Laser</option>
                <option value="Impressão 3D">Impressão 3D</option>
                <option value="Arduino">Arduino</option>
            </select>

            <label>Oficina 2 (Opcional)</label>
            <select id="oficina2">
                <option value="Nenhuma">Nenhuma</option>
                <option value="Montagem Robótica">Montagem Robótica</option>
            </select>

            <label>Oficina 3 (Opcional)</label>
            <select id="oficina3">
                <option value="Nenhuma">Nenhuma</option>
                <option value="Eletrônica">Eletrônica</option>
            </select>

            <button type="submit" id="btnSubmit">Confirmar Presença</button>
        </form>
    </div>

    <div id="areaQRCode">
        <h2 style="color: #16a34a; margin-bottom: 5px;">✓ Inscrição Concluída!</h2>
        <div class="aviso">Verifique o seu E-mail!</div>
        <p style="color: #64748b; font-size: 0.9em; margin-top: 10px;">Enviámos o seu QR Code oficial e os dados de acesso para a sua caixa de entrada (verifique também o SPAM).</p>
        <h3 id="mostraID" style="color: #2563eb; letter-spacing: 1px;"></h3>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbweQPNxz9oCX3phVVBXFvbhVFmugtfftEgXKmyUGP3lbaW0wZWOE-DfmE2-7OiVa2dv6A/exec"; 

    document.getElementById('formInscricao').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "Processando e Enviando...";
        btn.disabled = true;

        const dados = {
            action: "registrar",
            nome: document.getElementById('nome').value,
            matricula: document.getElementById('matricula').value,
            idade: document.getElementById('idade').value,
            instituicao: document.getElementById('instituicao').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            oficina1: document.getElementById('oficina1').value,
            oficina2: document.getElementById('oficina2').value,
            oficina3: document.getElementById('oficina3').value
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST', mode: 'cors', body: JSON.stringify(dados)
            });
            const result = await response.json();

            if(result.sucesso) {
                document.getElementById('formularioArea').style.display = 'none';
                document.getElementById('areaQRCode').style.display = 'block';
                document.getElementById('mostraID').innerText = `Seu ID: ${result.id}`;
            } else { alert("Erro: " + result.mensagem); }
        } catch (error) { alert("Erro de conexão."); }
        finally { btn.innerText = "Confirmar Presença"; btn.disabled = false; }
    });
</script>
</body>
</html>
